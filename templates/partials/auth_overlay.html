<div class="auth-overlay show" id="auth-overlay">
  <div class="auth-card">
    <div class="rail-kicker">Private workspace</div>
    <h2>Sign in to Editorial Pipeline</h2>
    <p>Access is restricted to Epicurean Media accounts managed by the superadmin.</p>
    <div class="field">
      <label for="login-email">Email</label>
      <input type="text" id="login-email" autocomplete="username">
    </div>
    <div class="field" style="margin-top:12px">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" autocomplete="current-password">
    </div>
    <div style="display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:18px;flex-wrap:wrap">
      <button class="pri" id="login-btn" style="width:auto">Sign in</button>
      <div class="muted" id="auth-mode-label">Auth mode: local</div>
    </div>
    <div class="auth-status" id="auth-status"></div>
  </div>
</div>
