<div class="toolbar">
  <div class="status-pill" id="run-chip">
    <span class="pulse"></span>
    <span id="run-chip-text">Pipeline running</span>
    <button class="btn" id="open-run">Open run</button>
  </div>
  <div class="toolbar-right">
    <div class="btn hide" id="cost-badge"></div>
    <div class="auth-inline hide" id="auth-toolbar">
      <div class="auth-chip">
        <span id="auth-user-label">Not signed in</span>
        <span class="auth-role" id="auth-user-role">guest</span>
      </div>
      <button class="btn" id="logout-btn">Log out</button>
    </div>
  </div>
</div>
