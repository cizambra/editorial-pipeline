[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.venvShellHook"]

[phases.install]
cmds = [
  "node --version",
  "python3 --version",
  "npm install",
  "python3 -m venv .venv",
  ". .venv/bin/activate && python -m ensurepip --upgrade",
  ". .venv/bin/activate && python -m pip install -v -r requirements.txt"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = ". .venv/bin/activate && uvicorn main:app --host 0.0.0.0 --port $PORT"
